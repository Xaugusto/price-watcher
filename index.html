<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceWatcher - Monitoramento Inteligente</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Bootstrap CSS -->
    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="node_modules/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="alternate" href="atom.xml" type="application/atom+xml" title="Atom">
</head>

<body>
    <div class="login-container">
        <div class="glass-panel login-card animate-fade-in">
            <div class="brand-logo text-center">
                <i class="bi bi-graph-up-arrow me-2"></i>PriceWatcher
            </div>

            <h4 class="text-center mb-4 px-3" style="color: var(--text-primary); font-weight: 500;">
                Monitore preços e economize de verdade.
            </h4>

            <form action="dashboard.html" method="GET">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control form-control-glass bg-transparent" id="emailInput"
                        placeholder="nome@exemplo.com" required>
                    <label for="emailInput">Endereço de Email</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" class="form-control form-control-glass bg-transparent" id="passwordInput"
                        placeholder="Senha" required>
                    <label for="passwordInput">Senha</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label text-secondary" for="rememberMe">
                            Lembrar-me
                        </label>
                    </div>
                    <a href="#" class="text-decoration-none" style="color: var(--primary-color);">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn btn-premium w-100 mb-3">
                    Entrar na Conta <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-secondary mb-0">Novo no PriceWatcher?
                    <a href="#" class="text-decoration-none fw-bold" style="color: var(--secondary-color);">Crie sua
                        conta</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
